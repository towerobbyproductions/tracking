<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game - GameTracker</title>
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/tracking/assets/css/style.css">
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="https://towerobbyproductions.github.io/games/site/assets/icon/favicon64%D1%8564.ico">
    
    <style>
        /* Базовые стили */
        body { font-family: 'Inter', sans-serif; }
        .slider-container { position: relative; overflow: hidden; border-radius: 12px; aspect-ratio: 16/9; }
        .slider-wrapper { display: flex; transition: transform 0.5s ease; height: 100%; }
        .slider-image { min-width: 100%; width: 100%; height: 100%; object-fit: cover; }
        .slider-button { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .slider-button:hover { background: rgba(0,162,255,0.8); }
        .slider-button.prev { left: 10px; }
        .slider-button.next { right: 10px; }
        .stat-card { transition: all 0.3s; }
        .stat-card:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-white dark:bg-roblox-dark text-gray-900 dark:text-white">
    <!-- Навигация -->
    <nav class="bg-gray-100 dark:bg-roblox-dark-secondary shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-8">
                    <a href="/tracking/home/" class="text-2xl font-bold text-roblox-blue">GameTracker</a>
                    <div class="hidden md:flex space-x-4">
                        <a href="/tracking/home/" class="px-3 py-2 rounded-md text-sm font-medium hover:text-roblox-blue">Home</a>
                        <a href="/tracking/request-a-game/" class="px-3 py-2 rounded-md text-sm font-medium hover:text-roblox-blue">Request Game</a>
                    </div>
                </div>
                <div class="flex items-center space-x-3">
                    <button id="themeToggle" class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition">🌙</button>
                    <button id="langToggle" class="px-3 py-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition font-medium">RU</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Основной контент -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Хлебные крошки -->
        <div class="text-sm mb-6">
            <a href="/tracking/home/" class="text-gray-500 dark:text-gray-400 hover:text-roblox-blue">Home</a>
            <span class="mx-2 text-gray-400">/</span>
            <span class="text-roblox-blue font-semibold" id="currentGameName">Loading...</span>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Левая колонка -->
            <div class="lg:col-span-2">
                <!-- Слайдер -->
                <div class="slider-container bg-gray-200 dark:bg-roblox-dark-secondary rounded-xl overflow-hidden mb-6">
                    <div class="slider-wrapper" id="sliderWrapper"></div>
                    <button class="slider-button prev" onclick="changeSlide(-1)">‹</button>
                    <button class="slider-button next" onclick="changeSlide(1)">›</button>
                </div>

                <!-- Описание -->
                <div class="bg-gray-100 dark:bg-roblox-dark-secondary rounded-xl p-6">
                    <h2 class="text-xl font-semibold mb-4">📝 Description</h2>
                    <p id="gameDescription" class="text-gray-700 dark:text-gray-300 leading-relaxed">Loading...</p>
                    
                    <div class="mt-6 grid grid-cols-2 gap-4">
                        <div><span class="text-sm text-gray-500 dark:text-gray-400">Created</span><div id="created" class="font-semibold">-</div></div>
                        <div><span class="text-sm text-gray-500 dark:text-gray-400">Updated</span><div id="updated" class="font-semibold">-</div></div>
                        <div><span class="text-sm text-gray-500 dark:text-gray-400">Genre</span><div id="genre" class="font-semibold">-</div></div>
                        <div><span class="text-sm text-gray-500 dark:text-gray-400">Subgenre</span><div id="subgenre" class="font-semibold">-</div></div>
                    </div>
                </div>
            </div>

            <!-- Правая колонка -->
            <div class="space-y-6">
                <div>
                    <h1 id="gameTitle" class="text-3xl font-bold mb-2">Loading...</h1>
                    <div class="owner-line">By <a id="ownerLink" href="#" class="text-roblox-blue font-semibold">Loading...</a></div>
                </div>

                <a id="playLink" href="#" target="_blank" class="block">
                    <button class="w-full bg-roblox-blue hover:bg-blue-600 text-white font-bold py-4 px-6 rounded-xl text-xl shadow-lg transition-all transform hover:scale-105">▶ Play Now</button>
                </a>

                <div class="grid grid-cols-2 gap-4">
                    <div class="stat-card bg-gray-100 dark:bg-roblox-dark-secondary rounded-xl p-4">
                        <div class="text-sm text-gray-500 dark:text-gray-400 mb-1">Active</div>
                        <div id="activePlayers" class="text-2xl font-bold text-roblox-blue">-</div>
                    </div>
                    <div class="stat-card bg-gray-100 dark:bg-roblox-dark-secondary rounded-xl p-4">
                        <div class="text-sm text-gray-500 dark:text-gray-400 mb-1">Favorites</div>
                        <div id="favorites" class="text-2xl font-bold text-yellow-500">-</div>
                    </div>
                    <div class="stat-card bg-gray-100 dark:bg-roblox-dark-secondary rounded-xl p-4">
                        <div class="text-sm text-gray-500 dark:text-gray-400 mb-1">Visits</div>
                        <div id="visits" class="text-2xl font-bold text-green-500">-</div>
                    </div>
                    <div class="stat-card bg-gray-100 dark:bg-roblox-dark-secondary rounded-xl p-4">
                        <div class="text-sm text-gray-500 dark:text-gray-400 mb-1">Server Size</div>
                        <div id="serverSize" class="text-2xl font-bold text-purple-500">-</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Футер -->
    <footer class="bg-gray-100 dark:bg-roblox-dark-secondary mt-12 border-t border-gray-200 dark:border-gray-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 text-center">
            <p class="text-sm text-gray-600 dark:text-gray-400">
                © <span id="year"></span> <a href="https://www.roblox.com/communities/102552180/Tower-Obby-Productions" class="text-roblox-blue font-semibold hover:underline">Tower Obby Productions</a>
            </p>
        </div>
    </footer>

    <script src="/tracking/assets/js/site.js"></script>
</body>
</html>
