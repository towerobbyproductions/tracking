<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        // Получаем ID игры из URL
        const path = window.location.pathname;
        const match = path.match(/\/games\/(\d+)\/([^\/]+)/);
        
        if (match) {
            // Перенаправляем на шаблон
            window.location.replace('/tracking/games/template.html');
        } else {
            window.location.replace('/tracking/404.html');
        }
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
