<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request a Game - GameTracker</title>
    
    <!-- Tailwind, fonts, css -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/tracking/assets/css/style.css">
    <link rel="icon" type="image/x-icon" href="https://towerobbyproductions.github.io/games/site/assets/icon/favicon64%D1%8564.ico">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'roblox-dark': '#191B1D',
                        'roblox-dark-secondary': '#232527',
                        'roblox-blue': '#00A2FF',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white dark:bg-roblox-dark text-gray-900 dark:text-white">
    <!-- Навигация -->
    <nav class="bg-gray-100 dark:bg-roblox-dark-secondary shadow-lg sticky top-0 z-50">
        <!-- ... -->
    </nav>

    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <!-- Заголовок -->
        <div class="text-center mb-12">
            <h1 class="text-4xl font-bold mb-4 bg-gradient-to-r from-roblox-blue to-purple-500 bg-clip-text text-transparent">
                Request Your Game
            </h1>
            <p class="text-lg text-gray-600 dark:text-gray-400">
                Fill out the form below to have your Roblox game tracked on our platform
            </p>
        </div>

        <!-- Форма -->
        <div class="bg-gray-100 dark:bg-roblox-dark-secondary rounded-2xl p-8 shadow-xl">
            <form id="gameRequestForm" class="space-y-6">
                <!-- Имя -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">First Name *</label>
                        <input type="text" name="firstName" required
                               class="w-full px-4 py-3 rounded-lg bg-white dark:bg-roblox-dark border border-gray-300 dark:border-gray-700 focus:border-roblox-blue focus:ring-2 focus:ring-roblox-blue/20 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Last Name</label>
                        <input type="text" name="lastName"
                               class="w-full px-4 py-3 rounded-lg bg-white dark:bg-roblox-dark border border-gray-300 dark:border-gray-700 focus:border-roblox-blue focus:ring-2 focus:ring-roblox-blue/20 outline-none transition">
                    </div>
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium mb-2">Email Address *</label>
                    <input type="email" name="email" required
                           class="w-full px-4 py-3 rounded-lg bg-white dark:bg-roblox-dark border border-gray-300 dark:border-gray-700 focus:border-roblox-blue focus:ring-2 focus:ring-roblox-blue/20 outline-none transition">
                </div>

                <!-- Roblox Username -->
                <div>
                    <label class="block text-sm font-medium mb-2">Roblox Username *</label>
                    <input type="text" name="robloxUsername" required
                           class="w-full px-4 py-3 rounded-lg bg-white dark:bg-roblox-dark border border-gray-300 dark:border-gray-700 focus:border-roblox-blue focus:ring-2 focus:ring-roblox-blue/20 outline-none transition">
                </div>

                <!-- Game Info -->
                <div>
                    <label class="block text-sm font-medium mb-2">Game ID or URL *</label>
                    <input type="text" name="gameId" required placeholder="e.g., 71240146627158 or full URL"
                           class="w-full px-4 py-3 rounded-lg bg-white dark:bg-roblox-dark border border-gray-300 dark:border-gray-700 focus:border-roblox-blue focus:ring-2 focus:ring-roblox-blue/20 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Universe ID (if known)</label>
                    <input type="text" name="universeId" placeholder="e.g., 9678437015"
                           class="w-full px-4 py-3 rounded-lg bg-white dark:bg-roblox-dark border border-gray-300 dark:border-gray-700 focus:border-roblox-blue focus:ring-2 focus:ring-roblox-blue/20 outline-none transition">
                </div>

                <!-- Game Name -->
                <div>
                    <label class="block text-sm font-medium mb-2">Game Name *</label>
                    <input type="text" name="gameName" required
                           class="w-full px-4 py-3 rounded-lg bg-white dark:bg-roblox-dark border border-gray-300 dark:border-gray-700 focus:border-roblox-blue focus:ring-2 focus:ring-roblox-blue/20 outline-none transition">
                </div>

                <!-- Reason -->
                <div>
                    <label class="block text-sm font-medium mb-2">Why should we add your game?</label>
                    <textarea name="reason" rows="4"
                              class="w-full px-4 py-3 rounded-lg bg-white dark:bg-roblox-dark border border-gray-300 dark:border-gray-700 focus:border-roblox-blue focus:ring-2 focus:ring-roblox-blue/20 outline-none transition"></textarea>
                </div>

                <!-- Submit -->
                <button type="submit" 
                        class="w-full bg-roblox-blue hover:bg-blue-600 text-white font-bold py-4 px-6 rounded-xl text-lg transition-all transform hover:scale-105 shadow-lg">
                    Submit Request
                </button>
            </form>

            <!-- Success Message (hidden initially) -->
            <div id="successMessage" class="hidden mt-6 p-4 bg-green-500/20 border border-green-500 rounded-lg text-center">
                <p class="text-green-600 dark:text-green-400 font-semibold">✓ Request sent successfully! We'll review it shortly.</p>
            </div>
        </div>

        <!-- Info -->
        <div class="mt-8 text-center text-sm text-gray-500 dark:text-gray-400">
            <p>By submitting this form, you agree to have your game publicly tracked on our platform.</p>
            <p class="mt-2">We'll notify you via email once your game is added.</p>
        </div>
    </div>

    <!-- Футер -->
    <footer class="bg-gray-100 dark:bg-roblox-dark-secondary mt-12 border-t border-gray-200 dark:border-gray-700">
        <!-- ... -->
    </footer>

    <script src="/tracking/assets/js/site.js"></script>
    <script>
        // Google Apps Script URL - замени на свой
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec';
        
        document.getElementById('gameRequestForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            // Добавляем метаданные
            data.timestamp = new Date().toISOString();
            data.userAgent = navigator.userAgent;
            
            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                // Показываем успех
                document.getElementById('successMessage').classList.remove('hidden');
                e.target.reset();
                
                // Скрываем через 5 секунд
                setTimeout(() => {
                    document.getElementById('successMessage').classList.add('hidden');
                }, 5000);
                
            } catch (error) {
                alert('Error sending request. Please try again later.');
                console.error(error);
            }
        });
    </script>
</body>
</html>
