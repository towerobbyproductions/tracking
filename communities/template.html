<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Community... - GameTracker</title>
    
    <!-- Tailwind, fonts, css (как в game template) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/tracking/assets/css/style.css">
    <link rel="icon" type="image/x-icon" href="https://towerobbyproductions.github.io/games/site/assets/icon/favicon64%D1%8564.ico">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'roblox-dark': '#191B1D',
                        'roblox-dark-secondary': '#232527',
                        'roblox-blue': '#00A2FF',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white dark:bg-roblox-dark text-gray-900 dark:text-white">
    <!-- Навигация -->
    <nav class="bg-gray-100 dark:bg-roblox-dark-secondary shadow-lg sticky top-0 z-50">
        <!-- ... -->
    </nav>

    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Хлебные крошки -->
        <div class="text-sm breadcrumbs mb-6">
            <a href="/tracking/home/" class="text-gray-500 dark:text-gray-400 hover:text-roblox-blue">Home</a>
            <span class="mx-2 text-gray-400">/</span>
            <a href="/tracking/home/#communities" class="text-gray-500 dark:text-gray-400 hover:text-roblox-blue">Communities</a>
            <span class="mx-2 text-gray-400">/</span>
            <span class="text-roblox-blue font-semibold" id="communityName">Loading...</span>
        </div>

        <!-- Шапка сообщества -->
        <div class="flex flex-col md:flex-row gap-6 items-start md:items-center mb-8">
            <img id="communityAvatar" class="w-24 h-24 rounded-xl object-cover shadow-lg" alt="Community avatar" src="">
            <div class="flex-1">
                <div class="flex items-center gap-3">
                    <h1 id="communityTitle" class="text-3xl font-bold">Loading...</h1>
                    <span id="membersCount" class="text-lg text-gray-500 dark:text-gray-400">- members</span>
                </div>
                <div class="mt-2">
                    <span class="text-sm text-gray-500 dark:text-gray-400">Owner:</span>
                    <a id="ownerLink" href="#" target="_blank" rel="noopener noreferrer" class="text-roblox-blue font-semibold ml-1">Loading...</a>
                </div>
                <div class="mt-4 flex gap-3">
                    <a id="viewOnRoblox" class="inline-block px-4 py-2 bg-roblox-blue hover:bg-blue-600 text-white rounded-lg font-semibold transition" href="#" target="_blank">
                        View on Roblox
                    </a>
                </div>
            </div>
        </div>

        <!-- О сообществе -->
        <section class="bg-gray-100 dark:bg-roblox-dark-secondary rounded-xl p-6 mb-8">
            <h2 class="text-xl font-semibold mb-4">📖 About</h2>
            <p id="communityAbout" class="text-gray-700 dark:text-gray-300 leading-relaxed">Loading...</p>
        </section>

        <!-- Игры сообщества -->
        <section>
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">🎮 Community Games</h2>
                <span id="gamesCount" class="text-sm text-gray-500 dark:text-gray-400">- games</span>
            </div>
            
            <div id="gamesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- JS заполнит карточками игр -->
            </div>
        </section>

        <!-- Статистика сообщества -->
        <section class="mt-8 grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="stat-card bg-gray-100 dark:bg-roblox-dark-secondary rounded-xl p-6 text-center">
                <div class="text-3xl font-bold text-roblox-blue" id="totalMembers">-</div>
                <div class="text-sm text-gray-600 dark:text-gray-400">Total Members</div>
            </div>
            <div class="stat-card bg-gray-100 dark:bg-roblox-dark-secondary rounded-xl p-6 text-center">
                <div class="text-3xl font-bold text-green-500" id="totalGamesCount">-</div>
                <div class="text-sm text-gray-600 dark:text-gray-400">Games</div>
            </div>
            <div class="stat-card bg-gray-100 dark:bg-roblox-dark-secondary rounded-xl p-6 text-center">
                <div class="text-3xl font-bold text-yellow-500" id="totalVisits">-</div>
                <div class="text-sm text-gray-600 dark:text-gray-400">Total Visits</div>
            </div>
        </section>
    </div>

    <!-- Футер -->
    <footer class="bg-gray-100 dark:bg-roblox-dark-secondary mt-12 border-t border-gray-200 dark:border-gray-700">
        <!-- ... -->
    </footer>

    <script src="/tracking/assets/js/site.js"></script>
    <script>
        const pathParts = window.location.pathname.split('/');
        const communityId = pathParts[pathParts.indexOf('communities') + 1];
        
        document.addEventListener('DOMContentLoaded', () => {
            loadCommunityData(communityId);
        });
    </script>
</body>
</html>
